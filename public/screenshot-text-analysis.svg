<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <!-- Background -->
  <rect width="1440" height="900" fill="#0d0d0d"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1440" height="900" fill="url(#grid)"/>

  <!-- Document lines (simulated text, partially visible) -->
  <g opacity="0.18" fill="#cccccc" font-family="monospace" font-size="13">
    <text x="160" y="160">sentiment_score = analyze(input_text, model="bert-base")</text>
    <text x="160" y="185">entities = ner_pipeline(text, threshold=0.82)</text>
    <text x="160" y="210">emotional_intensity = calc_intensity(tokens, weights)</text>
    <text x="160" y="235">result = {score: sentiment_score, entities: entities...}</text>
    <text x="160" y="285">def extract_features(text: str) -&gt; Dict[str, Any]:</text>
    <text x="160" y="310">    tokens = tokenizer.encode(text, max_length=512)</text>
    <text x="160" y="335">    embeddings = model(tokens).last_hidden_state</text>
    <text x="160" y="360">    return aggregate_features(embeddings)</text>
    <text x="160" y="410">classifier = Pipeline([</text>
    <text x="160" y="435">    ("tfidf", TfidfVectorizer(ngram_range=(1,3))),</text>
    <text x="160" y="460">    ("clf", LogisticRegression(C=1.2, max_iter=1000))</text>
    <text x="160" y="485">])</text>
    <text x="160" y="535">accuracy: 0.███  f1: 0.███  precision: 0.███</text>
    <text x="160" y="560">dataset: ██████████████  samples: █████</text>
    <text x="160" y="610">client: ██████████████████████████████</text>
    <text x="160" y="635">contract: ████████████  NDA signed: YES</text>
    <text x="160" y="660">deployment: ██████████████████████████</text>
  </g>

  <!-- Redaction bars -->
  <g fill="#1a1a1a">
    <rect x="475" y="522" width="130" height="18"/>
    <rect x="547" y="522" width="10" height="18" fill="#1a1a1a"/>
    <rect x="634" y="522" width="120" height="18"/>
    <rect x="812" y="522" width="140" height="18"/>
    <rect x="160" y="597" width="340" height="18"/>
    <rect x="160" y="622" width="200" height="18" x2="400"/>
    <rect x="360" y="622" width="180" height="18"/>
    <rect x="160" y="647" width="360" height="18"/>
  </g>

  <!-- CONFIDENTIAL diagonal stamp -->
  <g transform="translate(720, 450) rotate(-22)">
    <text
      x="0" y="20"
      text-anchor="middle"
      font-family="Arial Black, Impact, sans-serif"
      font-size="96"
      font-weight="900"
      fill="none"
      stroke="#ff0000"
      stroke-width="2.5"
      opacity="0.85"
      letter-spacing="8"
    >CONFIDENTIAL</text>
  </g>

  <!-- Top-left label -->
  <text x="160" y="110" font-family="monospace" font-size="11" fill="#ffffff" opacity="0.35" letter-spacing="4">AMERICAN EXPRESS · NLP DIVISION · INTERNAL USE ONLY</text>
  <line x1="160" y1="120" x2="700" y2="120" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>

  <!-- Bottom classification bar -->
  <rect x="0" y="858" width="1440" height="42" fill="#ff0000" opacity="0.12"/>
  <text x="720" y="885" text-anchor="middle" font-family="monospace" font-size="11" fill="#ff0000" opacity="0.9" letter-spacing="6">CLASSIFICATION: CONFIDENTIAL // NOT FOR DISTRIBUTION</text>
</svg>
